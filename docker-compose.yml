# Shikkhabhumi backend — Docker Compose (VPS production)
# Copy to .env and fill values: cp .env.docker.example .env

name: shikkhabhumi

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: shikkhabhumi-api:latest
    container_name: shikkhabhumi-api
    restart: unless-stopped
    command: node index.js
    environment:
      PORT: "3000"
      RUN_WORKER: "0"
      REDIS_URL: redis://redis:6379
    # Ensure .env PORT=5000 does not override Docker internal port
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "node", "scripts/docker-healthcheck.js"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s
    volumes:
      - app_keys:/app/keys
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: shikkhabhumi-api:latest
    container_name: shikkhabhumi-worker
    restart: unless-stopped
    command: node src/worker/index.js
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - app_keys:/app/keys
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: shikkhabhumi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: shikkhabhumi-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend:
    driver: bridge

volumes:
  redis_data:
  app_keys:

worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    gzip on;
    gzip_types application/vnd.apple.mpegurl application/json;
    gzip_min_length 1000;

    upstream node_api {
        least_conn;
        server 127.0.0.1:3000;
        # Scale: add more API instances behind PM2 cluster / extra ports
        # server 127.0.0.1:3001;
        keepalive 32;
    }

    server {
        listen       80;
        server_name  localhost;

        client_max_body_size 500M;

        # Health (for load tests + monitoring)
        location /health {
            proxy_pass http://node_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # REST API
        location /v1/ {
            proxy_pass http://node_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 900s;
            proxy_send_timeout 900s;
        }

        # Socket.io (sticky session via ip_hash if multiple upstreams)
        location /socket.io/ {
            proxy_pass http://node_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        location /videos/ {
            alias "D:/Encryption Learning Platfrom/backend/public/private_videos/";

            secure_link $arg_md5,$arg_expires;
            secure_link_md5 "$arg_expires$uri YOUR_SHARED_SECRET_FROM_ENV";

            if ($secure_link = "") {
                return 403;
            }
            if ($secure_link = "0") {
                return 410;
            }

            add_header Access-Control-Allow-Origin "*";
            add_header Cache-Control "no-cache";

            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
        }
    }
}
